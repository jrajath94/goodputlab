name: CI

on:
  push:
    branches: [main, master, 'phase-*']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  audit:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-requests

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Type check (mypy strict)
        run: mypy core control scripts

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: audit
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=core --cov=control --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        env:
          PATTERN: '^(feat|fix|perf|test|docs|refactor|bench|ci|chore)(\(.+\))?!?: .{1,72}$'
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")
            if ! printf '%s\n' "$subject" | grep -qE "$PATTERN"; then
              printf '::error file=commit,title=invalid-subject::sha=%s subject=%s\n' "$sha" "$subject"
              bad=1
            fi
          done < <(git rev-list origin/main..HEAD --no-merges 2>/dev/null || git rev-list origin/master..HEAD --no-merges 2>/dev/null || echo "")
          if [ "$bad" -ne 0 ]; then
            printf '::error::one or more commit subjects violate Conventional Commits\n'
            exit 1
          fi
          printf 'all commit subjects OK\n'

  sentinel-gate:
    name: Sentinel integration gate (NIXL safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify sentinel CLI exists
        run: test -f tests/sentinel.py
      - name: Verify sentinel daemon exists
        run: test -f scripts/sentinel_daemon.py
      - name: Verify health.sh calls _run_sentinel
        run: |
          set -euo pipefail
          grep -q "_run_sentinel" scripts/health.sh || \
            (echo "::error::health.sh missing _run_sentinel" && exit 1)
          grep -q "sentinel-token" scripts/health.sh || \
            (echo "::error::health.sh missing sentinel-token step" && exit 1)
      - name: Verify UCX-only NIXL pin in configs
        run: |
          set -euo pipefail
          # D-05: UCX transport required, LIBFABRIC forbidden (vllm #27055)
          grep -riq "UCX" configs/kv_producer.json configs/kv_consumer.json 2>/dev/null || \
            (echo "::error::NIXL transport not pinned to UCX in configs/" && exit 1)
          echo "NIXL UCX pin OK"
