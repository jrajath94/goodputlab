# GoodputLab RunPod matrix config — FULL 216-cell sweep.
#
# *** FINAL POLISH ONLY — NEVER A DEBUGGING RUN. ***
# Prerequisites (docs/GPU_COST_OPTIMIZATION.md Rung 6): runpod_smoke
# reconciled, runpod_paired_chat reconciled, runpod_context_repair clean
# (no HTTP 400), and disagg topologies backed by true separate P/D
# processes — otherwise drop disagg/disagg_tier from `topologies` below.
# Budget: ~$8-12 expected, hard safety cap $20.
# Requires --approve-cost or APPROVE_GPU_SPEND=yes.
#
# Sweep size AS CONFIGURED BELOW: 4 topologies x 1 model (qwen2.5-7b)
#             x 6 rates (1, 2, 4, 8, 16, 32 rps)
#             x 3 mixes (chat, rag, agentic)
#           = 72 cells
# (The nominal 216-cell matrix adds qwen3-1.7b + qwen3-30b; multi-model
# needs one vLLM process per model — planned v1.1.)
#
# Topology notes:
#   - colocated  : vLLM default single-pool. Always runnable.
#   - chunked    : vLLM --enable-chunked-prefill. No extra setup needed.
#   - disagg     : vLLM P/D disaggregation w/ NIXL UCX. Needs prefill +
#                  decode vLLM instances on separate ports.
#   - disagg_tier: LMCache KV tier in addition to disagg. Most setup.
#
# NOTE: For the first full sweep, recommend limiting topologies to
# [colocated, chunked] and models to [qwen2.5-7b, qwen3-30b] for cost
# control. DISAGG/DISAGG_TIER require additional vLLM instances — see
# deploy/ for setup scripts (WIP).
#
# Estimated cost on H100 SXM secure @ $2.99/hr:
#   - Pilot data: 0.004 USD/cell x 216 cells = ~$0.86 bench time
#   - Single-pod sequential (~30s/cell avg): ~108 min = ~$5.38
#   - Plus ~3 min vLLM model load + 1 warmup per model = ~10 min = ~$0.50
#   - TOTAL realistic: ~$6 single-pod
#
# Run:    python -m scripts.run_matrix --config configs/runpod_matrix_full.yaml
# Output: bench/results/runpod_full/<cell_id>.json + summary.json

# --- sweep subset ---
# Cost-controlled first run: single model (qwen2.5-7b), 4 topologies, 6
# rates, 3 mixes = 72 cells. vLLM serves one model per process; multi-model
# sweep needs separate vLLM instances (planned v1.1).
#
# Topology caveat: colocated/chunked use vLLM defaults. DISAGG/DISAGG_TIER
# use the SAME single vLLM instance in this run (label-only); true DISAGG
# needs separate prefill + decode + NIXL UCX setup (planned v1.1).
topologies: [colocated, chunked, disagg, disagg_tier]
models: [qwen2.5-7b]
rates_rps: [1, 2, 4, 8, 16, 32]
mixes: [chat, rag, agentic]

# --- per-cell load ---
n_warmup: 5
n_measure: 30

# --- cost model ---
# H100 SXM secure (RunPod) — update if renting a different class.
cost_per_hour_usd: 2.99
smoke: false
# RAG worst prompt+output measured at 18,539 tokens (bench/preflight.py);
# launch vLLM with --max-model-len 20480 to match.
max_model_len: 20480

# --- output ---
output_dir: bench/results/runpod_full
pod_id: local-full  # set to actual RunPod pod id on real runs

# --- vLLM endpoint (set via env on real pod) ---
vllm_base_url_env: RUNPOD_VLLM_BASE_URL